<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>The Editorial Intelligence - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "secondary-fixed-dim": "#ffb1c8",
                  "outline": "#8f7065",
                  "on-tertiary-fixed-variant": "#00497c",
                  "secondary-container": "#feadc5",
                  "inverse-surface": "#2f3130",
                  "secondary": "#8b4a60",
                  "surface-container-high": "#e9e8e7",
                  "primary-fixed": "#ffdbcd",
                  "surface-container": "#eeeeed",
                  "tertiary": "#0061a2",
                  "on-primary-fixed-variant": "#7e2c00",
                  "on-secondary-fixed-variant": "#6f3348",
                  "surface-dim": "#dadad9",
                  "on-background": "#1a1c1c",
                  "on-primary-container": "#541b00",
                  "on-secondary-container": "#7a3d52",
                  "inverse-on-surface": "#f1f0f0",
                  "background": "#faf9f8",
                  "on-tertiary-container": "#003053",
                  "on-tertiary": "#ffffff",
                  "on-error": "#ffffff",
                  "surface-container-low": "#f4f3f2",
                  "on-primary-fixed": "#360f00",
                  "on-surface": "#1a1c1c",
                  "on-error-container": "#93000a",
                  "surface-variant": "#e3e2e1",
                  "error": "#ba1a1a",
                  "surface": "#faf9f8",
                  "secondary-fixed": "#ffd9e2",
                  "primary-fixed-dim": "#ffb597",
                  "surface-container-lowest": "#ffffff",
                  "on-secondary": "#ffffff",
                  "on-primary": "#ffffff",
                  "surface-container-highest": "#e3e2e1",
                  "tertiary-fixed-dim": "#9dcaff",
                  "surface-tint": "#a53d00",
                  "inverse-primary": "#ffb597",
                  "on-surface-variant": "#5a4137",
                  "primary": "#a53d00",
                  "outline-variant": "#e3bfb1",
                  "error-container": "#ffdad6",
                  "tertiary-fixed": "#d1e4ff",
                  "on-tertiary-fixed": "#001d35",
                  "on-secondary-fixed": "#39081d",
                  "primary-container": "#ff6200",
                  "surface-bright": "#faf9f8",
                  "tertiary-container": "#009afc"
                },
                fontFamily: {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Inter"],
                  "label": ["Inter"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
              },
            },
          }
        </script>
    <style>
          .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          }
          .editorial-shadow {
            box-shadow: 0 20px 40px rgba(26, 28, 28, 0.06);
          }
          .orange-gradient-btn {
            background: linear-gradient(135deg, #a53d00 0%, #ff6200 100%);
          }
        </style>
    </head>
    <body class="bg-background font-body text-on-surface">
    <!-- Main Content Area -->
    <main class="min-h-screen">
    <!-- Scrollable Content -->
    <div class="pt-12 pb-24 px-12 max-w-7xl">
    <!-- Hero Section -->
    <section class="mb-16">
    <div class="flex items-center gap-3">
    <img alt="ING Logo" class="w-10 h-10 rounded-lg" src="https://i.ibb.co/zH79SY8C/ING-logo.png">
    <span class="text-2xl font-black text-[#ff6200] tracking-tighter font-headline">ING SymphonyAI</span>
    </div>
    </section>
    <!-- Campaigns Section -->
    <section class="mb-20">
    <div class="flex items-center justify-between mb-8">
    <h3 class="font-headline text-2xl font-bold tracking-tight">Campaigns</h3>
    </div>
    <div class="grid grid-cols-2 gap-4">
    <a class="group bg-surface-container-lowest p-8 rounded-xl editorial-shadow hover:-translate-y-1 transition-all flex items-center justify-center" href="#" target="_top">
    <p class="font-headline font-bold text-on-surface group-hover:text-[#ff6200] text-lg">Start a new campaign</p>
    </a>
    <a class="group bg-surface-container-lowest p-8 rounded-xl editorial-shadow hover:-translate-y-1 transition-all flex items-center justify-center" href="#" target="_top">
    <p class="font-headline font-bold text-on-surface group-hover:text-[#ff6200] text-lg">View existing campaign</p>
    </a>
    </div>
    </section>
    <!-- Start Creating Section (Bento Row) -->
    <section class="mb-20">
    <div class="flex items-center justify-between mb-8">
    <h3 class="font-headline text-2xl font-bold tracking-tight" style="">Work on campaign task</h3>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
    <!-- Card 1 -->
    <button onclick="document.getElementById('brief-modal').classList.remove('hidden')" class="group bg-surface-container-lowest p-6 rounded-xl editorial-shadow hover:-translate-y-1 transition-all flex flex-col justify-between aspect-square text-left w-full">
    <div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-[#ff6200] mb-4">
    <span class="material-symbols-outlined" style="">insights</span>
    </div>
    <p class="font-headline font-bold text-on-surface group-hover:text-[#ff6200] leading-tight" style="">Create a strategy or market insight</p>
    </button>
    <!-- Card 2 -->
    <button onclick="document.getElementById('brief-modal').classList.remove('hidden')" class="group bg-surface-container-lowest p-6 rounded-xl editorial-shadow hover:-translate-y-1 transition-all flex flex-col justify-between aspect-square text-left w-full">
    <div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-[#ff6200] mb-4">
    <span class="material-symbols-outlined" style="">assignment</span>
    </div>
    <p class="font-headline font-bold text-on-surface group-hover:text-tertiary leading-tight" style="">Create a brief</p>
    </button>
    <!-- Card 3 -->
    <button onclick="document.getElementById('brief-modal').classList.remove('hidden')" class="group bg-surface-container-lowest p-6 rounded-xl editorial-shadow hover:-translate-y-1 transition-all flex flex-col justify-between aspect-square text-left w-full">
    <div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-[#ff6200] mb-4">
    <span class="material-symbols-outlined" style="">lightbulb</span>
    </div>
    <p class="font-headline font-bold text-on-surface group-hover:text-secondary leading-tight">Generate campaign ideas</p>
    </button>
    <!-- Card 4 -->
    <button onclick="document.getElementById('brief-modal').classList.remove('hidden')" class="group bg-surface-container-lowest p-6 rounded-xl editorial-shadow hover:-translate-y-1 transition-all flex flex-col justify-between aspect-square text-left w-full">
    <div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-[#ff6200] mb-4">
    <span class="material-symbols-outlined" style="">layers</span>
    </div>
    <p class="font-headline font-bold text-on-surface group-hover:text-[#ff6200] leading-tight" style="">Produce assets at scale</p>
    </button>
    <!-- Card 5 -->
    <button onclick="document.getElementById('brief-modal').classList.remove('hidden')" class="group bg-surface-container-lowest p-6 rounded-xl editorial-shadow hover:-translate-y-1 transition-all flex flex-col justify-between aspect-square text-left w-full">
    <div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-[#ff6200] mb-4">
    <span class="material-symbols-outlined" style="">language</span>
    </div>
    <p class="font-headline font-bold text-on-surface group-hover:text-primary leading-tight" style="">Localise assets</p>
    </button>
    </div>
    </section>
    </div>
    </main>
    <!-- Brief Modal -->
    <div id="brief-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white rounded-xl shadow-2xl overflow-hidden relative" style="width:520px;">
    <button onclick="document.getElementById('brief-modal').classList.add('hidden')" class="absolute top-3 right-3 text-gray-500 hover:text-gray-800">
    <span class="material-symbols-outlined">close</span>
    </button>
    <iframe src="https://mrmworkfront.my.workfront.com/requests/newRequestEmbedded?projectID=69b856480006ff3e3202f2e2613224b1&skipQssRedirect=true" frameborder="0" width="520" height="600"></iframe>
    </div>
    </div>
    </body></html>
