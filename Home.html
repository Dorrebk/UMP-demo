    <!-- Adobe Express Embed SDK -->
    <script>
      (async () => {
        try {
          const { editor, module } = await window.CCEverywhere.initialize({
            clientId: 'f739f4e0c9674ea99605c8c6251eae50',
            appName: 'ING'
          });
          const appConfig = {
            callbacks: {
              onCancel: () => {},
              onPublish: (intent, publishParams) => {
                console.log('Published:', publishParams);
              },
              onError: (err) => {
                console.error('Adobe Express error:', err);
              }
            }
          };
          document.getElementById('adobe-express-btn').addEventListener('click', () => {
            editor.create({}, appConfig);
          });
          const t2iAppConfig = {
            promptText: 'make an image of someone sitting in the lobby of a bank. In instagram post format',
            callbacks: {
              onCancel: () => {},
              onPublish: (publishParams) => {
                console.log('T2I Published:', publishParams);
              },
              onError: (err) => {
                console.error('Adobe Express T2I error:', err);
              }
            }
          };
          document.getElementById('adobe-t2i-btn').addEventListener('click', () => {
            module.createImageFromText(t2iAppConfig);
          });
        } catch (e) {
          console.error('Adobe Express SDK init failed:', e);
        }
      })();
    </script>
    <!-- Listen for Workfront form submission and redirect -->
    <script>
      window.addEventListener('message', function(event) {
        if (event.origin.indexOf('workfront.com') === -1) return;
        var data = typeof event.data === 'string' ? event.data : (event.data && event.data.type);
        if (data === 'requestSubmitted') {
          window.top.location.href = 'https://experience.adobe.com/#/@accenture-partner/so:mrmworkfront-Production/workfront/canvasDashboard/69b9a4cc7937bb1878b7cce5';
